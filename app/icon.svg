<!--
  Marca Spectra: o campo de barras espectrais, lido da esquerda para a direita
  como um espectrograma. As cores são os tokens --spectra-1..5 e --background
  resolvidos em sRGB — um favicon é servido fora do documento e não enxerga as
  custom properties, então ao mexer nos tokens este arquivo acompanha à mão.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#090a0f"/>
  <g>
    <rect x="5"    y="12" width="3.2" height="8"  rx="1.6" fill="#ff6a65"/>
    <rect x="9.7"  y="9"  width="3.2" height="14" rx="1.6" fill="#e9c025"/>
    <rect x="14.4" y="6"  width="3.2" height="20" rx="1.6" fill="#31d78c"/>
    <rect x="19.1" y="10" width="3.2" height="12" rx="1.6" fill="#00b3f2"/>
    <rect x="23.8" y="8"  width="3.2" height="16" rx="1.6" fill="#ac77fa"/>
  </g>
</svg>
